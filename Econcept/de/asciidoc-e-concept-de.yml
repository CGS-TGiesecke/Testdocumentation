
name: Build E-Konzept de html, pdf, docx

on:
  workflow_dispatch:
    inputs:
      pdfTheme:
        description: 'Asciidoctor PDF Theme'
        required: true
        default: 'CGS'
        type: choice
        options:
          - CGS
          - ARC
      version:
        description: 'Assist Version (auto=latest)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - 1.4.0
          - 1.3.1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FILENAME: 'E-Konzept'
  FILEPATH: 'Econcept/de'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Resolve version (auto-from-file or manual)
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION_FILE="VERSION.txt"

          if [[ "${INPUT_VERSION}" == "auto" ]]; then
            if [[ ! -f "${VERSION_FILE}" ]]; then
              echo "Error: ${VERSION_FILE} not found while version=auto." >&2
              exit 1
            fi
            # Erste nicht-leere Zeile lesen
            VERSION="$(awk 'NF{print; exit}' "${VERSION_FILE}")"
            if [[ -z "${VERSION}" ]]; then
              echo "Error: No non-empty line found in ${VERSION_FILE}." >&2
              exit 1
            fi
          else
            VERSION="${INPUT_VERSION}"
          fi

          # Optional: einfache SemVer-Validierung (z. B. 1.2.3, 1.2.3-rc1)
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9\.-]+)?$ ]]; then
            echo "Error: Version '${VERSION}' does not match expected format (e.g., 1.4.0 or 1.4.0-rc1)." >&2
            exit 1
          fi

          echo "Resolved version: ${VERSION}"
          echo "USED_VERSION=${VERSION}" >> $GITHUB_ENV


      - name: Install Asciidoctor & Asciidoctor-pdf
        run: |
          sudo gem install asciidoctor asciidoctor-pdf

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '3.1.6.2'

      - name: Install envsubst (gettext)
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Define metadata variables
        run: |
          # Setze Titel/Autor/Anwendung dynamisch
          if [ "${{ github.event.inputs.pdfTheme }}" = "ARC" ]; then
            echo "PRODUCT_TITLE=AI Audit Assist: E.Gruppe Konzept" >> $GITHUB_ENV
            echo "AUTHOR=ARC Institute" >> $GITHUB_ENV
            echo "APPLICATION=AI Audit Assist" >> $GITHUB_ENV
            echo "ARC-ASSIST=1" >> $GITHUB_ENV
            echo "CGS-ASSIST=0" >> $GITHUB_ENV
          else
            echo "PRODUCT_TITLE=CGS Assist: Software für den Mittelstand -  E.Gruppe Konzept" >> $GITHUB_ENV
            echo "AUTHOR=CGS mbH" >> $GITHUB_ENV
            echo "APPLICATION=CGS Assist" >> $GITHUB_ENV
            echo "ARC-ASSIST=0" >> $GITHUB_ENV
            echo "CGS-ASSIST=1" >> $GITHUB_ENV
          fi
          echo "REVNUMBER=${{ env.USED_VERSION }}" >> $GITHUB_ENV
          # Setze Unternehmen statisch
          echo "COMPANY=Example AG" >> $GITHUB_ENV
          # Setze Tagesdatum im deutschen Format
          echo "DATE=$(date '+%d.%m.%Y')" >> $GITHUB_ENV

      - name: Fill metadata template
        run: |
          envsubst < ${{ env.FILEPATH }}/metadata.yml.tpl > ${{ env.FILEPATH }}/metadata.yml

      - name: Build HTML with Asciidoctor
        run: |
          asciidoctor \
            -D ${{ env.FILEPATH }}/ \
            -a product_title="${{ env.PRODUCT_TITLE }}" \
            -a revnumber="${{ env.REVNUMBER }}" \
            -a application="${{ env.APPLICATION }}" \
            -a author="${{ env.AUTHOR }}" \
            -a company="${{ env.COMPANY }}" \
            -a date="${{ env.DATE }}" \
            -a cgs-assist="${{ env.CGS-ASSIST }}" \
            -a arc-assist="${{ env.ARC-ASSIST }}" \
            -a stylesheet=../../themes/html-style.css \
            -o ${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.html ${{ env.FILEPATH }}/index.adoc

      - name: Build PDF with Asciidoctor-pdf
        run: |
          asciidoctor-pdf \
           -D ${{ env.FILEPATH }} \
           -a product_title="${{ env.PRODUCT_TITLE }}" \
           -a revnumber="${{ env.REVNUMBER }}" \
           -a application="${{ env.APPLICATION }}" \
           -a author="${{ env.AUTHOR }}" \
           -a company="${{ env.COMPANY }}" \
           -a date="${{ env.DATE }}" \
           -a cgs-assist="${{ env.CGS-ASSIST }}" \
           -a arc-assist="${{ env.ARC-ASSIST }}" \
           -a pdf-theme="${{ github.event.inputs.pdfTheme }}" \
           -a pdf-themesdir=./themes \
           -o ${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.pdf ${{ env.FILEPATH }}/index.adoc

      - name: Build DOCX with Pandoc von html
        run: |
          pandoc ${{ env.FILEPATH }}/${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.html \
            --from=html \
            --to=docx \
            --standalone \
            --reference-doc=../../themes/style-reference.docx \
            --metadata-file=${{ env.FILEPATH }}/metadata.yml \
            --resource-path=${{ env.FILEPATH }}  \
            -o ${{ env.FILEPATH }}/${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.docx
            
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}_${{ github.event.inputs.pdfTheme }}_${{ env.DATE }}
          path: |
            ${{ env.FILEPATH }}/${{ env.FILENAME }}*.pdf
            ${{ env.FILEPATH }}/${{ env.FILENAME }}*.html
            ${{ env.FILEPATH }}/${{ env.FILENAME }}*.docx
