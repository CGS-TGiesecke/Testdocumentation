extends: default
title_page:
  background_image: image:CGS-TitlePage.png[]
  title:
    font-size: 38
    font-color: '090909'
    font-style: bold
    align: center
    top-margin: 10  # Abstand von oben in Punkten
  subtitle:
    font-size: 20
    font-color: '94948d'
    font-style: italic
    align: left
    top-margin: 20
  author:
    font-size: 16
    font-color: '4F2F9C'
    align: left
    top-margin: 30
  date:
    font-size: 16
    font-color: '4F2F9C'
    align: left
    top-margin: 40
base:
  font-family: Noto Serif
  font-size: 12
  font-color: '222222'
page:
  margin: [36, 36, 36, 36]
heading:
  h1: {font-size: 23, font-color: '3f6172', font-style: italic}
  h2: {font-size: 21, font-color: '3f6172', font-style: italic}
  h3: {font-size: 19, font-color: '3f6172', font-style: italic}
  h4: {font-size: 17, font-color: '3f6172', font-style: italic}
  h5: {font-size: 15, font-color: '3f6172', font-style: italic}
  h6: {font-size: 12, font-color: '3f6172', font-style: italic}
table:
  padding: 12px;
  border-color: 'EEEEEE'
  head:
    font-color: '3f6172'
    background-color: 'ECECEC'
    font-style: italic
  body:
    font-color: '222222'
code:
  background-color: '#f6f6f6'
image-caption:
  font_color: '#006699'
  font_size: 8
role: # geht so nur in pdf
  highlight:
    font_color: '3f6172'   # für die Textfarbe
    background_color: 'ECECEC'  # als Hintergrund
    border_radius: 5
    padding: [12, 12, 12, 12]
