
name: Build Catalog

on:
  workflow_dispatch:
    inputs:
      UC1:  { type: boolean, required: false, default: false, description: "UC1" }
      UC2:  { type: boolean, required: false, default: false, description: "UC2" }
      UC3:  { type: boolean, required: false, default: false, description: "UC3" }
      UC4:  { type: boolean, required: false, default: false, description: "UC4" }
      UC5:  { type: boolean, required: false, default: false, description: "UC5" }
      UC6:  { type: boolean, required: false, default: false, description: "UC6" }
      UC7:  { type: boolean, required: false, default: false, description: "UC7" }
      UC8:  { type: boolean, required: false, default: false, description: "UC8" }
      UC9:  { type: boolean, required: false, default: false, description: "UC9" }
      UC10: { type: boolean, required: false, default: false, description: "UC10" }
      UC11: { type: boolean, required: false, default: false, description: "UC11" }
      UC12: { type: boolean, required: false, default: false, description: "UC12" }
      UC13: { type: boolean, required: false, default: false, description: "UC13" }
      UC14: { type: boolean, required: false, default: false, description: "UC14" }
      UC15: { type: boolean, required: false, default: false, description: "UC15" }
      UC16: { type: boolean, required: false, default: false, description: "UC16" }
      UC17: { type: boolean, required: false, default: false, description: "UC17" }
      UC18: { type: boolean, required: false, default: false, description: "UC18" }
      UC19: { type: boolean, required: false, default: false, description: "UC19" }
      UC20: { type: boolean, required: false, default: false, description: "UC20" }

env:
  FILENAME: "USE_CASE_CATALOG_DE"
  FILEPATH: "usesCasesCatalog/de"

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Asciidoctor & Asciidoctor-pdf
        run: |
          sudo gem install asciidoctor asciidoctor-pdf

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '3.9'

      - name: Declare dependency matrix + resolve hard dependencies
        id: deps
        run: |
          declare -A DEP
          
          # Dependency definitions (from your JSON)
          DEP[UC2]="UC4"
          DEP[UC4]="UC1 UC20"
          DEP[UC6]="UC14 UC15"
          DEP[UC8]="UC17"
          DEP[UC12]="UC16"
          DEP[UC17]="UC8"
          DEP[UC20]="UC3"

          # Initialize all vars
          for i in {1..20}; do
            UC="UC$i"
            VALUE="${{ github.event.inputs[format('UC%s', i)] }}"
            if [ "$VALUE" = "true" ]; then
              eval "$UC=1"
            else
              eval "$UC=0"
            fi
          done

          # Recursive dependency resolution (hard dependencies)
          changed=1
          while [ $changed -eq 1 ]; do
            changed=0
            for i in {1..20}; do
              UC="UC$i"
              if [ "$(eval echo \$$UC)" -eq 1 ]; then
                for D in ${DEP[$UC]}; do
                  if [ "$(eval echo \$$D)" -eq 0 ]; then
                    eval "$D=1"
                    changed=1
                  fi
                done
              fi
            done
          done

          # Export to environment
          for i in {1..20}; do
            UC="UC$i"
            echo "$UC=$(eval echo \$$UC)" >> $GITHUB_ENV
          done

      - name: Read version
        run: |
          echo "VERSION=$(cat VERSION.txt)" >> $GITHUB_ENV

      - name: Build PDF
        run: |
          PARAMS=""
          for i in {1..20}; do
            UC="UC$i"
            PARAMS="$PARAMS -a $UC=${{ env[$UC] }}"
          done

          asciidoctor-pdf \
            -D "${{ env.FILEPATH }}/" \
            $PARAMS \
            -a application="CGS Assist: Software für den Mittelstand - Use Case Katalog" \
            -a pdf-theme="CGS" \
            -a pdf-themesdir=./themes \
            -o "${{ env.FILENAME }}_${{ env.VERSION }}.pdf" \
            "${{ env.FILEPATH }}/index.adoc"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}_${{ env.VERSION }}
          path: "${{ env.FILEPATH }}/*.pdf"
