name: Build Onboarding de html, pdf, docx

on:
  workflow_dispatch:
    inputs:
      pdfTheme:
        description: 'Asciidoctor PDF Theme'
        required: true
        default: 'CGS'
        type: choice
        options:
          - CGS
          - ARC
      version:
        description: 'Assist Version (auto=latest)'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - 1.4.0
          - 1.3.1

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FILENAME: 'ONBOARDING_CATALOG_DE'
  FILEPATH: 'onboardingCatalog/de'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------
      # 0) Checkout
      # ------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1) Version ermitteln
      # ------------------------------------------------------------
      - name: Resolve version
        id: resolve
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION_FILE="VERSION.txt"

          if [[ "${INPUT_VERSION}" == "auto" ]]; then
            VERSION="$(awk 'NF{print; exit}' "${VERSION_FILE}")"
          else
            VERSION="${INPUT_VERSION}"
          fi

          echo "USED_VERSION=${VERSION}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 2) Asciidoctor installieren
      # ------------------------------------------------------------
      - name: Install Asciidoctor & Asciidoctor-pdf
        run: sudo gem install asciidoctor asciidoctor-pdf

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext

      # ------------------------------------------------------------
      # 3) Metadaten vorbereiten
      # ------------------------------------------------------------
      - name: Define metadata variables
        run: |
          if [ "${{ github.event.inputs.pdfTheme }}" = "ARC" ]; then
            echo "PRODUCT_TITLE=AI Audit Assist: Onboarding Fragebogen" >> $GITHUB_ENV
            echo "AUTHOR=ARC Institute" >> $GITHUB_ENV
            echo "APPLICATION=AI Audit Assist" >> $GITHUB_ENV
            echo "ARC-ASSIST=1" >> $GITHUB_ENV
            echo "CGS-ASSIST=0" >> $GITHUB_ENV
          else
            echo "PRODUCT_TITLE=CGS Assist: Software für den Mittelstand - Onboarding Fragebogen" >> $GITHUB_ENV
            echo "AUTHOR=CGS mbH" >> $GITHUB_ENV
            echo "APPLICATION=CGS Assist" >> $GITHUB_ENV
            echo "ARC-ASSIST=0" >> $GITHUB_ENV
            echo "CGS-ASSIST=1" >> $GITHUB_ENV
          fi

          echo "REVNUMBER=${{ env.USED_VERSION }}" >> $GITHUB_ENV
          echo "COMPANY=Example AG" >> $GITHUB_ENV
          echo "DATE=$(date '+%d.%m.%Y')" >> $GITHUB_ENV

      - name: Fill metadata template
        run: |
          envsubst < ${{ env.FILEPATH }}/metadata.yml.tpl \
            > ${{ env.FILEPATH }}/metadata.yml

      # ------------------------------------------------------------
      # 4) HTML erzeugen
      # ------------------------------------------------------------
      - name: Build HTML with Asciidoctor
        run: |
          asciidoctor \
            -D ${{ env.FILEPATH }}/ \
            -a product_title="${{ env.PRODUCT_TITLE }}" \
            -a revnumber="${{ env.REVNUMBER }}" \
            -a application="${{ env.APPLICATION }}" \
            -a author="${{ env.AUTHOR }}" \
            -a company="${{ env.COMPANY }}" \
            -a date="${{ env.DATE }}" \
            -a cgs-assist="${{ env.CGS-ASSIST }}" \
            -a arc-assist="${{ env.ARC-ASSIST }}" \
            -a stylesheet=../../themes/html-style.css \
            -o ${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.html \
            ${{ env.FILEPATH }}/index.adoc

      # ------------------------------------------------------------
      # 5) PDF erzeugen
      # ------------------------------------------------------------
      - name: Build PDF with Asciidoctor-pdf
        run: |
          asciidoctor-pdf \
            -D ${{ env.FILEPATH }} \
            -a product_title="${{ env.PRODUCT_TITLE }}" \
            -a revnumber="${{ env.REVNUMBER }}" \
            -a application="${{ env.APPLICATION }}" \
            -a author="${{ env.AUTHOR }}" \
            -a company="${{ env.COMPANY }}" \
            -a date="${{ env.DATE }}" \
            -a cgs-assist="${{ env.CGS-ASSIST }}" \
            -a arc-assist="${{ env.ARC-ASSIST }}" \
            -a pdf-theme="${{ github.event.inputs.pdfTheme }}" \
            -a pdf-themesdir=./themes \
            -o ${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.pdf \
            ${{ env.FILEPATH }}/index.adoc

      # ------------------------------------------------------------
      # 6) DOCX erzeugen über html-docx-js
      # ------------------------------------------------------------

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install html-docx-js
        run: npm install html-docx-js

      - name: Convert HTML → DOCX using html-docx-js
        run: |
          node tools/html-to-docx.js \
            "${{ env.FILEPATH }}/${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.html" \
            "${{ env.FILEPATH }}/${{ env.FILENAME }}_v_${{ env.REVNUMBER }}_${{ env.DATE }}.docx"

      # ------------------------------------------------------------
      # 7) Artefakte uploaden
      # ------------------------------------------------------------
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FILENAME }}_${{ github.event.inputs.pdfTheme }}_${{ env.DATE }}
          path: |
            ${{ env.FILEPATH }}/${{ env.FILENAME }}*.pdf
            ${{ env.FILEPATH }}/${{ env.FILENAME }}*.html
            ${{ env.FILEPATH }}/${{ env.FILENAME }}*.docx
