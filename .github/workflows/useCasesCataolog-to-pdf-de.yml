name: Build Catalog

on:
  workflow_dispatch:
    inputs:
      UC1:  { type: boolean, default: false }
      UC2:  { type: boolean, default: false }
      UC3:  { type: boolean, default: false }
      UC4:  { type: boolean, default: false }
      UC5:  { type: boolean, default: false }
      UC6:  { type: boolean, default: false }
      UC7:  { type: boolean, default: false }
      UC8:  { type: boolean, default: false }
      UC9:  { type: boolean, default: false }
      UC10: { type: boolean, default: false }
      UC11: { type: boolean, default: false }
      UC12: { type: boolean, default: false }
      UC13: { type: boolean, default: false }
      UC14: { type: boolean, default: false }
      UC15: { type: boolean, default: false }
      UC16: { type: boolean, default: false }
      UC17: { type: boolean, default: false }
      UC18: { type: boolean, default: false }
      UC19: { type: boolean, default: false }
      UC20: { type: boolean, default: false }

env:
  FILENAME: "USE_CASE_CATALOG_DE"
  FILEPATH: "usesCasesCatalog/de"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version (auto-from-file or manual)
        id: resolve
        shell: bash
        run: |
           set -euo pipefail
           INPUT_VERSION="${{ github.event.inputs.version }}"
           VERSION_FILE="VERSION.txt"

           if [[ "${INPUT_VERSION}" == "auto" ]]; then
             if [[ ! -f "${VERSION_FILE}" ]]; then
               echo "Error: ${VERSION_FILE} not found while version=auto." >&2
               exit 1
             fi
             # Erste nicht-leere Zeile lesen
             VERSION="$(awk 'NF{print; exit}' "${VERSION_FILE}")"
             if [[ -z "${VERSION}" ]]; then
               echo "Error: No non-empty line found in ${VERSION_FILE}." >&2
               exit 1
             fi
           else
             VERSION="${INPUT_VERSION}"
           fi

           # Optional: einfache SemVer-Validierung (z. B. 1.2.3, 1.2.3-rc1)
           if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9\.-]+)?$ ]]; then
             echo "Error: Version '${VERSION}' does not match expected format (e.g., 1.4.0 or 1.4.0-rc1)." >&2
             exit 1
           fi

           echo "Resolved version: ${VERSION}"
           echo "USED_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Install Asciidoctor & Asciidoctor-pdf
        run: |
          sudo gem install asciidoctor asciidoctor-pdf

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '3.9'

      - name: Install envsubst (gettext)
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Define metadata variables
        run: |
            echo "PRODUCT_TITLE=CGS Assist: Software für den Mittelstand - Benutzerhandbuch" >> $GITHUB_ENV
            echo "REVNUMBER=$USED_VERSION" >> $GITHUB_ENV


      - name: Load and resolve dependencies
        id: deps
        run: |
          declare -A DEP
          DEP[UC2]="UC4"
          DEP[UC4]="UC1 UC20"
          DEP[UC6]="UC14 UC15"
          DEP[UC8]="UC17"
          DEP[UC12]="UC16"
          DEP[UC17]="UC8"
          DEP[UC20]="UC3"

          # Input übergeben
          for i in {1..20}; do
            UC="UC$i"
            VAL="${{ github.event.inputs.UC1 }}"
          done

          # Inputs in Bash-Variablen

          UC1=$([ "${{ github.event.inputs.UC1 }}" = "true" ] && echo 1 || echo 0)
          UC2=$([ "${{ github.event.inputs.UC2 }}" = "true" ] && echo 1 || echo 0)
          UC3=$([ "${{ github.event.inputs.UC3 }}" = "true" ] && echo 1 || echo 0)
          UC4=$([ "${{ github.event.inputs.UC4 }}" = "true" ] && echo 1 || echo 0)
          UC5=$([ "${{ github.event.inputs.UC5 }}" = "true" ] && echo 1 || echo 0)
          UC6=$([ "${{ github.event.inputs.UC6 }}" = "true" ] && echo 1 || echo 0)
          UC7=$([ "${{ github.event.inputs.UC7 }}" = "true" ] && echo 1 || echo 0)
          UC8=$([ "${{ github.event.inputs.UC8 }}" = "true" ] && echo 1 || echo 0)
          UC9=$([ "${{ github.event.inputs.UC9 }}" = "true" ] && echo 1 || echo 0)
          UC10=$([ "${{ github.event.inputs.UC10 }}" = "true" ] && echo 1 || echo 0)
          UC11=$([ "${{ github.event.inputs.UC11 }}" = "true" ] && echo 1 || echo 0)
          UC12=$([ "${{ github.event.inputs.UC12 }}" = "true" ] && echo 1 || echo 0)
          UC13=$([ "${{ github.event.inputs.UC13 }}" = "true" ] && echo 1 || echo 0)
          UC14=$([ "${{ github.event.inputs.UC14 }}" = "true" ] && echo 1 || echo 0)
          UC15=$([ "${{ github.event.inputs.UC15 }}" = "true" ] && echo 1 || echo 0)
          UC16=$([ "${{ github.event.inputs.UC16 }}" = "true" ] && echo 1 || echo 0)
          UC17=$([ "${{ github.event.inputs.UC17 }}" = "true" ] && echo 1 || echo 0)
          UC18=$([ "${{ github.event.inputs.UC18 }}" = "true" ] && echo 1 || echo 0)
          UC19=$([ "${{ github.event.inputs.UC19 }}" = "true" ] && echo 1 || echo 0)
          UC20=$([ "${{ github.event.inputs.UC20 }}" = "true" ] && echo 1 || echo 0)


          # Hard Dependencies (rekursiv)
          changed=1
          while [ $changed -eq 1 ]; do
            changed=0
            for i in {1..20}; do
              UC="UC$i"
              val=$(eval echo \$$UC)
              if [ "$val" -eq 1 ]; then
                for D in ${DEP[$UC]}; do
                  if [ "$(eval echo \$$D)" -eq 0 ]; then
                    eval "$D=1"
                    changed=1
                  fi
                done
              fi
            done
          done

          # Export final values
          for i in {1..20}; do
            UC="UC$i"
            echo "$UC=$(eval echo \$$UC)" >> $GITHUB_ENV
          done

      - name: Build PDF
        run: |
          PARAMS=""
          for i in {1..20}; do
            UC="UC$i"
            PARAMS="$PARAMS -a $UC=${!UC}"
          done

          asciidoctor-pdf \
            -D "${{ env.FILEPATH }}/" \
            $PARAMS \
            -a product_title="${{ env.PRODUCT_TITLE }}" \
            -a revnumber="${{ env.REVNUMBER }}" \
            -a pdf-theme="CGS" \
            -a pdf-themesdir=./themes \
            -o "${{ env.FILENAME }}_${{ env.REVNUMBER }}.pdf" \
            "${{ env.FILEPATH }}/index.adoc"

      - uses: actions/upload-artifact@v4
        with:
          name: "${{ env.FILENAME }}_${{ env.REVNUMBER }}"
          path: "${{ env.FILEPATH }}/*.pdf"
